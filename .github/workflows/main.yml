name: Quality Gate + E2E Bug Hunters

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  quality:
    name: TypeScript + Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm install
      - name: Verificacao TypeScript
        run: npx tsc --noEmit
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - name: ESLint (avisos existentes no App.tsx - nao bloqueia)
        run: npm run lint
        continue-on-error: true
      - name: Testes unitarios Vitest
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - name: Resumo Quality Gate
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## OK Quality Gate passou" >> $GITHUB_STEP_SUMMARY
            echo "TypeScript, ESLint e testes unitarios: tudo certo." >> $GITHUB_STEP_SUMMARY
          else
            echo "## FALHOU Quality Gate" >> $GITHUB_STEP_SUMMARY
            echo "Veja os logs acima para detalhes do erro." >> $GITHUB_STEP_SUMMARY
          fi

  e2e:
    name: E2E (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: smoke-auth
            specs: 'cypress/e2e/01-smoke.cy.ts,cypress/e2e/02-auth.cy.ts'
            descricao: 'App carrega + Login'
          - group: task-creation-access
            specs: 'cypress/e2e/03-task-creation.cy.ts,cypress/e2e/04-collaborator-access.cy.ts'
            descricao: 'Criacao de tarefa (bug Diego) + Acesso colaborador (bug Andreia)'
          - group: visibility-realtime-admin
            specs: 'cypress/e2e/05-task-visibility.cy.ts,cypress/e2e/06-realtime.cy.ts,cypress/e2e/07-admin-panel.cy.ts'
            descricao: 'Visibilidade de tarefas + Tempo real + Painel admin'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm install
      - name: Rodar testes - ${{ matrix.descricao }}
        id: cypress
        uses: cypress-io/github-action@v6
        continue-on-error: true
        with:
          install: false
          spec: ${{ matrix.specs }}
          config: baseUrl=https://vpclick.vpsistema.com
          browser: chrome
          headed: false
        env:
          CYPRESS_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          CYPRESS_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CYPRESS_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          CYPRESS_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          CYPRESS_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          CYPRESS_COLLAB_EMAIL: ${{ secrets.TEST_COLLAB_EMAIL }}
          CYPRESS_COLLAB_PASSWORD: ${{ secrets.TEST_COLLAB_PASSWORD }}
      - name: Resumo em portugues
        if: always()
        run: |
          STATUS="${{ steps.cypress.outcome }}"
          GRUPO="${{ matrix.group }}"
          DESC="${{ matrix.descricao }}"
          if [ "$STATUS" = "success" ]; then
            echo "## OK $DESC" >> $GITHUB_STEP_SUMMARY
            echo "Todos os testes passaram sem problemas." >> $GITHUB_STEP_SUMMARY
          else
            echo "## FALHOU: $DESC" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$GRUPO" = "smoke-auth" ]; then
              echo "**O que pode estar errado:**" >> $GITHUB_STEP_SUMMARY
              echo "- O site vpclick.vpsistema.com pode estar fora do ar" >> $GITHUB_STEP_SUMMARY
              echo "- Problema no login via Supabase" >> $GITHUB_STEP_SUMMARY
              echo "- Credenciais de teste incorretas nos Secrets do GitHub" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$GRUPO" = "task-creation-access" ]; then
              echo "**O que pode estar errado:**" >> $GITHUB_STEP_SUMMARY
              echo "- Bug do Diego voltou: criacao de tarefa sem lista nao mostra erro, ou botao ficou travado de novo" >> $GITHUB_STEP_SUMMARY
              echo "- Bug da Andreia voltou: colaborador nao ve os espacos que tem acesso" >> $GITHUB_STEP_SUMMARY
              echo "- Pode ter sido uma mudanca no codigo que quebrou o modal de criacao" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$GRUPO" = "visibility-realtime-admin" ]; then
              echo "**O que pode estar errado:**" >> $GITHUB_STEP_SUMMARY
              echo "- Bug de visibilidade voltou: colaborador dentro de um espaco nao ve as tarefas" >> $GITHUB_STEP_SUMMARY
              echo "- Realtime parou: mudanca de acesso pelo admin nao reflete em tempo real" >> $GITHUB_STEP_SUMMARY
              echo "- Painel admin sem feedback: salvar acesso nao mostra confirmacao" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Clique em Cypress run acima para ver o video e screenshot do erro." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload screenshots (so em caso de falha)
        uses: actions/upload-artifact@v4
        if: steps.cypress.outcome == 'failure'
        with:
          name: screenshots-${{ matrix.group }}
          path: cypress/screenshots
          if-no-files-found: ignore
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ matrix.group }}
          path: cypress/videos
          if-no-files-found: ignore

  relatorio-final:
    name: Relatorio Final
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: always()
    steps:
      - name: Gerar relatorio e abrir issue se falhou
        env:
          QUALITY: ${{ needs.quality.result }}
          E2E: ${{ needs.e2e.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
          COMMIT: ${{ github.sha }}
        run: |
          DATA=$(date -u '+%d/%m/%Y %H:%M')
          URL="https://github.com/$REPO/actions/runs/$RUN_ID"

          echo "## Relatorio VP CLICK -- $DATA UTC" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$QUALITY" = "success" ] && [ "$E2E" = "success" ]; then
            echo "### TUDO FUNCIONANDO" >> $GITHUB_STEP_SUMMARY
            echo "O sistema esta saudavel. Nenhum bug detectado nessa rodada." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "### PROBLEMAS ENCONTRADOS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$QUALITY" != "success" ]; then
            echo "- TypeScript quebrou o build: alguma mudanca de codigo criou um erro de tipo." >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$E2E" != "success" ]; then
            echo "- Testes E2E falharam: veja os resumos dos jobs acima para saber qual bug voltou." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ver detalhes: $URL" >> $GITHUB_STEP_SUMMARY

          if [ "$TRIGGER" = "push" ] || [ "$TRIGGER" = "schedule" ]; then
            SHORT=$(echo "$COMMIT" | cut -c1-7)
            gh issue create \
              --repo "$REPO" \
              --title "Bug detectado no VP CLICK -- $DATA UTC (commit $SHORT)" \
              --body "## O que aconteceu

          Os testes automaticos detectaram um problema no VP CLICK em $DATA UTC.

          ## Status dos testes
          - Quality Gate (TypeScript): $QUALITY
          - Testes E2E (Cypress): $E2E

          ## O que fazer agora
          1. Acesse os detalhes completos: $URL
          2. Em cada job com falha tem um resumo em portugues explicando o que quebrou
          3. Baixe os videos e screenshots nos artefatos para ver o erro na tela

          ## Commit que disparou o erro
          $COMMIT

          ---
          Aberto automaticamente pelo pipeline de testes VP CLICK." \
              2>/dev/null || echo "Aviso: issue nao criada (label bug pode nao existir)"
          fi
