name: Deploy — vpclick.vpsistema.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy Hostinger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build producao
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Descobrir caminho public_html
        id: find_path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          script: |
            for p in \
              "$HOME/domains/vpclick.vpsistema.com/public_html" \
              "$HOME/public_html/vpclick.vpsistema.com" \
              "$HOME/public_html" \
            ; do
              if [ -d "$p" ]; then
                echo "DEPLOY_PATH=$p"
                break
              fi
            done

      - name: Enviar arquivos via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          source: "dist/*"
          target: "domains/vpclick.vpsistema.com/public_html"
          strip_components: 1
          rm: true

      - name: Verificar deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          script: |
            echo "=== Arquivos em public_html ==="
            ls -la ~/domains/vpclick.vpsistema.com/public_html/ | head -20
            echo "=== index.html (primeiras linhas) ==="
            head -5 ~/domains/vpclick.vpsistema.com/public_html/index.html 2>/dev/null || echo "index.html nao encontrado"
