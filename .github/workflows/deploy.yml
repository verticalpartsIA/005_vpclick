name: Deploy — vpclick.vpsistema.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy Hostinger (SFTP/SSH)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build producao
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      # O Hostinger deste projeto expõe apenas SSH/SFTP na porta 65002 — o deploy
      # antigo usava FTP (porta 21) e falhava sempre com "530 Login incorrect".
      # Enviamos o build por SFTP usando as mesmas credenciais SSH.
      - name: Deploy via SFTP para Hostinger
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          local_path: './dist/*'
          remote_path: '/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/vpclick.vpsistema.com/public_html'
          sftp_only: true
          delete_remote_files: false
