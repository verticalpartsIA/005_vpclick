name: Deploy — vpclick.vpsistema.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy Hostinger (SFTP/SSH)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build producao
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      # O Hostinger deste projeto expõe apenas SSH/SFTP na porta 65002 — o deploy
      # antigo usava FTP (porta 21) e falhava sempre com "530 Login incorrect".
      # Enviamos o build por SFTP usando as mesmas credenciais SSH.
      # A chave privada vai no secret HOSTINGER_SSH_KEY_B64 em base64 (linha única),
      # para não corromper ao copiar/colar do terminal. Decodificamos aqui e
      # enviamos ./dist via SCP por SSH (porta 65002).
      - name: Deploy via SSH/SCP para Hostinger
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
        run: |
          set -e
          # Remove quaisquer espaços/quebras de linha que o copy-paste tenha
          # inserido no base64 antes de decodificar.
          printf '%s' "$SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > deploy_key
          chmod 600 deploy_key
          # valida que a chave decodificou para um formato de chave privada
          head -n1 deploy_key | grep -q 'PRIVATE KEY' || { echo 'ERRO: HOSTINGER_SSH_KEY_B64 não decodificou para uma chave privada válida'; exit 1; }
          mkdir -p ~/.ssh
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i deploy_key -P 65002 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -r dist/* \
            "$SSH_USER@$SSH_HOST:/home/$SSH_USER/domains/vpclick.vpsistema.com/public_html/"
          rm -f deploy_key
